<body>
    <div id="root"></div>

    <div class="music-player" id="music-player" aria-live="polite">
        <button
            type="button"
            class="music-player-collapse"
            id="music-panel-toggle"
            aria-controls="music-player-body"
            aria-expanded="true"
            aria-label="Collapse music controls"
        >

        </button>
        <div class="music-player-body" id="music-player-body">

            <div class="music-player-meta" id="music-status">3 MP3 tracks, auto play after 10 seconds at 15% volume</div>
            <div class="music-player-volume">
                <div class="music-player-volume-row">
                    <span>Volume</span>
                    <span class="music-player-volume-value" id="music-volume-value">15%</span>
                </div>
                <input
                    type="range"
                    min="0"
                    max="100"
                    step="1"
                    value="15"
                    class="music-player-slider"
                    id="music-volume"
                    aria-label="Music volume"
                >
            </div>
            <div class="music-player-actions">
                <button type="button" class="music-player-button primary" id="music-toggle">Play</button>
                <button type="button" class="music-player-button secondary" id="music-next">Next Song</button>
            </div>
        </div>
